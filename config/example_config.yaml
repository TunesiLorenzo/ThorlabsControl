simulation:
  enabled: true

mst602:
  serial: "YOUR_MST602_SERIAL"
  is_rack_system: true
  scale: "step"
  channels:
    x: 1
    y: 2

nanotrak:
  enabled: true
  serial: "YOUR_NANOTRAK_SERIAL"
  poll_interval_ms: 200
  detector_threshold: 0.2
  tracking_mode: "track"
  kinesis_dll_dir: "C:/Program Files/Thorlabs/Kinesis"
  assembly_candidates:
    - "Thorlabs.MotionControl.DeviceManagerCLI"
    - "Thorlabs.MotionControl.GenericNanoTrakCLI"
    - "Thorlabs.MotionControl.Benchtop.NanoTrakCLI"
    - "Thorlabs.MotionControl.ModularRack.NanoTrakCLI"
